syntax = "proto3";
package dendra.modelregistry.v1;

import "amino/amino.proto";
import "cosmos/base/query/v1beta1/pagination.proto";
import "dendra/modelregistry/v1/model.proto";
import "dendra/modelregistry/v1/params.proto";
import "gogoproto/gogo.proto";
import "google/api/annotations.proto";

option go_package = "dendra/x/modelregistry/types";

// Query defines the gRPC querier service.
service Query {
  // Parameters queries the parameters of the module.
  rpc Params(QueryParamsRequest) returns (QueryParamsResponse) {
    option (google.api.http).get = "/dendra/modelregistry/v1/params";
  }

  // Model queries un modèle enregistré par son id.
  rpc Model(QueryModelRequest) returns (QueryModelResponse) {
    option (google.api.http).get = "/dendra/modelregistry/v1/model/{id}";
  }

  // Models liste tous les modèles enregistrés.
  rpc Models(QueryModelsRequest) returns (QueryModelsResponse) {
    option (google.api.http).get = "/dendra/modelregistry/v1/models";
  }
}

// QueryParamsRequest is request type for the Query/Params RPC method.
message QueryParamsRequest {}

// QueryParamsResponse is response type for the Query/Params RPC method.
message QueryParamsResponse {
  // params holds all the parameters of this module.
  Params params = 1 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
}

message QueryModelRequest {
  string id = 1;
}

message QueryModelResponse {
  Model model = 1 [(gogoproto.nullable) = false];
}

message QueryModelsRequest {}

message QueryModelsResponse {
  repeated Model models = 1 [(gogoproto.nullable) = false];
}
