syntax = "proto3";
package dendra.modelregistry.v1;

import "amino/amino.proto";
import "dendra/modelregistry/v1/model.proto";
import "dendra/modelregistry/v1/params.proto";
import "gogoproto/gogo.proto";

option go_package = "dendra/x/modelregistry/types";

// GenesisState defines the modelregistry module's genesis state.
message GenesisState {
  // params defines all the parameters of the module.
  Params params = 1 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];

  // models — registre de modèles AUTORISÉS posé au genesis (épinglage SANS gouvernance ; un devnet
  // peut ainsi démarrer avec son/ses modèle(s) canonique(s) déjà enregistré(s) + actif(s)).
  repeated Model models = 2 [(gogoproto.nullable) = false];
}
