// MsgProveAvailability -- Phase 1b : un mineur prouve sa disponibilité en répondant au DÉFI de l'époque
// courante (= AppHash du bloc de frontière, imprévisible -> pas de pré-calcul). Signé par l'OPÉRATEUR.
message MsgProveAvailability {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string miner_id = 2;
  string challenge = 3;
  string vrf_proof = 4; // preuve ECVRF sur le defi (hex 80o) ; requis si le mineur a une vrf_pubkey
}

// MsgProveAvailabilityResponse defines the MsgProveAvailabilityResponse message.
message MsgProveAvailabilityResponse {}

// MsgSubmitVrfBeacon (CR-10) -- pose la graine VRF vérifiable d'un job (autorité beacon).
message MsgSubmitVrfBeacon {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string job_id = 2;
  string vrf_proof = 3; // preuve ECVRF (hex 80o) sur job_id, vérifiée contre params.vrf_beacon_pubkey
}

message MsgSubmitVrfBeaconResponse {}

// MsgRotateMinerKeys (V6-03) -- rotation des clés ancrées d'un mineur (par son opérateur).
message MsgRotateMinerKeys {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string miner_id = 2;
  string new_enc_pubkey = 3; // vide = inchangé
  string new_vrf_pubkey = 4; // vide = inchangé
}

message MsgRotateMinerKeysResponse {}

// E4 (VRF decentralisee, vote-extensions) : un VALIDATEUR ancre sa cle PUBLIQUE VRF Ed25519 on-chain,
// signe par son compte d'operateur. Elle sert a VERIFIER ses vote-extensions VRF (ExtendVote) cote
// consensus. Auto-autorisee : le signataire ancre SA propre cle (cle d'un autre compte = jamais consultee).
// Dormant tant que vote_extensions_enable_height n'est pas pose -> zero impact sur la chaine actuelle.
message MsgRegisterValidatorVrfKey {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string vrf_pubkey = 2; // cle publique VRF Ed25519 (hex 32o)
  string vrf_pop = 3;    // VE-02 : proof-of-possession = preuve VRF (hex 80o) sur "dendra/vrf-pop/<creator>"
}
message MsgRegisterValidatorVrfKeyResponse {}
