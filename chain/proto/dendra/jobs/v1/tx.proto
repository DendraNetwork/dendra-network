syntax = "proto3";

package dendra.jobs.v1;

import "amino/amino.proto";
import "cosmos/msg/v1/msg.proto";
import "cosmos_proto/cosmos.proto";
import "dendra/jobs/v1/params.proto";
import "gogoproto/gogo.proto";

option go_package = "dendra/x/jobs/types";

// Msg defines the Msg service.
service Msg {
  option (cosmos.msg.v1.service) = true;

  // UpdateParams defines a (governance) operation for updating the module
  // parameters. The authority defaults to the x/gov module account.
  rpc UpdateParams(MsgUpdateParams) returns (MsgUpdateParamsResponse);

  // CreateMiner defines the CreateMiner RPC.
  rpc CreateMiner(MsgCreateMiner) returns (MsgCreateMinerResponse);

  // UpdateMiner defines the UpdateMiner RPC.
  rpc UpdateMiner(MsgUpdateMiner) returns (MsgUpdateMinerResponse);

  // DeleteMiner defines the DeleteMiner RPC.
  rpc DeleteMiner(MsgDeleteMiner) returns (MsgDeleteMinerResponse);

  // CreateJob defines the CreateJob RPC.
  rpc CreateJob(MsgCreateJob) returns (MsgCreateJobResponse);

  // UpdateJob defines the UpdateJob RPC.
  rpc UpdateJob(MsgUpdateJob) returns (MsgUpdateJobResponse);

  // DeleteJob defines the DeleteJob RPC.
  rpc DeleteJob(MsgDeleteJob) returns (MsgDeleteJobResponse);

  // CreatePools defines the CreatePools RPC.
  rpc CreatePools(MsgCreatePools) returns (MsgCreatePoolsResponse);

  // UpdatePools defines the UpdatePools RPC.
  rpc UpdatePools(MsgUpdatePools) returns (MsgUpdatePoolsResponse);

  // DeletePools defines the DeletePools RPC.
  rpc DeletePools(MsgDeletePools) returns (MsgDeletePoolsResponse);

  // SettleJob defines the SettleJob RPC.
  rpc SettleJob(MsgSettleJob) returns (MsgSettleJobResponse);

  // SlashMiner defines the SlashMiner RPC.
  rpc SlashMiner(MsgSlashMiner) returns (MsgSlashMinerResponse);

  // ClaimSubsidy defines the ClaimSubsidy RPC.
  rpc ClaimSubsidy(MsgClaimSubsidy) returns (MsgClaimSubsidyResponse);

  // ReportDivergence defines the ReportDivergence RPC.
  rpc ReportDivergence(MsgReportDivergence) returns (MsgReportDivergenceResponse);

  // RewardTraining defines the RewardTraining RPC.
  rpc RewardTraining(MsgRewardTraining) returns (MsgRewardTrainingResponse);

  // PayReal defines the PayReal RPC.
  rpc PayReal(MsgPayReal) returns (MsgPayRealResponse);

  // CreateCommit defines the CreateCommit RPC.
  rpc CreateCommit(MsgCreateCommit) returns (MsgCreateCommitResponse);

  // UpdateCommit defines the UpdateCommit RPC.
  rpc UpdateCommit(MsgUpdateCommit) returns (MsgUpdateCommitResponse);

  // DeleteCommit defines the DeleteCommit RPC.
  rpc DeleteCommit(MsgDeleteCommit) returns (MsgDeleteCommitResponse);

  // FinalizeJob defines the FinalizeJob RPC.
  rpc FinalizeJob(MsgFinalizeJob) returns (MsgFinalizeJobResponse);

  // SettlePay defines the SettlePay RPC.
  rpc SettlePay(MsgSettlePay) returns (MsgSettlePayResponse);

  // OpenJob defines the OpenJob RPC.
  rpc OpenJob(MsgOpenJob) returns (MsgOpenJobResponse);

  // Payout defines the Payout RPC.
  rpc Payout(MsgPayout) returns (MsgPayoutResponse);

  // VerifySemantic defines the VerifySemantic RPC.
  rpc VerifySemantic(MsgVerifySemantic) returns (MsgVerifySemanticResponse);

  // CreateBeacon defines the CreateBeacon RPC.
  rpc CreateBeacon(MsgCreateBeacon) returns (MsgCreateBeaconResponse);

  // UpdateBeacon defines the UpdateBeacon RPC.
  rpc UpdateBeacon(MsgUpdateBeacon) returns (MsgUpdateBeaconResponse);

  // DeleteBeacon defines the DeleteBeacon RPC.
  rpc DeleteBeacon(MsgDeleteBeacon) returns (MsgDeleteBeaconResponse);

  // SettleSemantic defines the SettleSemantic RPC.
  rpc SettleSemantic(MsgSettleSemantic) returns (MsgSettleSemanticResponse);

  // ProveAvailability defines the ProveAvailability RPC (Phase 1b -- disponibilité).
  rpc ProveAvailability(MsgProveAvailability) returns (MsgProveAvailabilityResponse);
  // SubmitVrfBeacon (CR-10) : pose la graine de comité d'un job depuis une preuve VRF vérifiable.
  rpc SubmitVrfBeacon(MsgSubmitVrfBeacon) returns (MsgSubmitVrfBeaconResponse);
  // RotateMinerKeys (V6-03) : remplace enc/vrf pubkey d'un mineur sans Delete+Create (préserve Demand/Stake).
  rpc RotateMinerKeys(MsgRotateMinerKeys) returns (MsgRotateMinerKeysResponse);
  rpc RegisterValidatorVrfKey(MsgRegisterValidatorVrfKey) returns (MsgRegisterValidatorVrfKeyResponse);
  // DisputeVerdict (INT-1 v0) : conteste le verdict d'un job REGLE (permissionless + bond) -> re-adjudication.
  rpc DisputeVerdict(MsgDisputeVerdict) returns (MsgDisputeVerdictResponse);
  // ResolveDispute (INT-1 v0 inc.2) : resout une dispute (autorite interim) -> rembourse+recompense ou slash le bond.
  rpc ResolveDispute(MsgResolveDispute) returns (MsgResolveDisputeResponse);
  // AdjudicateDispute (INT-1 v0 inc.4) : clot une dispute SANS gouvernance (trustless) -> verdict d'un comite
  // FRAIS (re-commits "<job>__redo__<miner>", mineurs hors-origine, MAJORITE DU STAKE). Remplace l'autorite interim.
  rpc AdjudicateDispute(MsgAdjudicateDispute) returns (MsgAdjudicateDisputeResponse);
}

// MsgUpdateParams is the Msg/UpdateParams request type.
message MsgUpdateParams {
  option (cosmos.msg.v1.signer) = "authority";
  option (amino.name) = "dendra/x/jobs/MsgUpdateParams";

  // authority is the address that controls the module (defaults to x/gov unless overwritten).
  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // params defines the module parameters to update.

  // NOTE: All parameters must be supplied.
  Params params = 2 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
}

// MsgUpdateParamsResponse defines the response structure for executing a
// MsgUpdateParams message.
message MsgUpdateParamsResponse {}

// MsgDisputeVerdict (INT-1 v0) — conteste le verdict d'un job REGLE (permissionless + bond).
message MsgDisputeVerdict {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string job_id = 2;
}

message MsgDisputeVerdictResponse {}

// MsgResolveDispute (INT-1 v0 inc.2) — resout une dispute ouverte. INTERIM : gate AUTORITE (gov) ;
// l'auto-resolution par comite frais (trustless) = increment 3. upheld=true -> dispute valide.
message MsgResolveDispute {
  option (cosmos.msg.v1.signer) = "authority";
  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string job_id = 2;
  bool upheld = 3;
}

message MsgResolveDisputeResponse {}

// MsgAdjudicateDispute (INT-1 v0 inc.4) — clot une dispute de facon PERMISSIONLESS : la chaine relit les
// re-commits d'un comite FRAIS (cle "<job>__redo__<miner>", mineurs ENREGISTRES HORS comite d'origine) et
// tranche par MAJORITE DU STAKE frais (anti-sybil). N'importe qui peut declencher apres la fenetre.
message MsgAdjudicateDispute {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string job_id = 2;
}

message MsgAdjudicateDisputeResponse {}

// MsgCreateMiner defines the MsgCreateMiner message.
message MsgCreateMiner {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string miner_id = 2;
  string operator = 3;
  string region = 4;
  uint64 stake = 5;
  string enc_pubkey = 6; // pub X25519 (hex) ancree a l'enregistrement (anti-MITM MM-02)
  string vrf_pubkey = 7; // pub VRF Ed25519 (hex) ancree a l'enregistrement (ECVRF dispo)
}

// MsgCreateMinerResponse defines the MsgCreateMinerResponse message.
message MsgCreateMinerResponse {}

